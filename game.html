<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Step ahead</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; margin: 0 auto; background: #000; image-rendering: pixelated; }
    #hud {
      display: none; position: fixed; left: 10px; top: 10px; color: #fff;
      font: 12px/1.3 monospace; background: rgba(0,0,0,0.5);
      padding: 8px 10px; border-radius: 6px;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud"></div>


<script>
(() => {
  // =========================
  // CONFIG
  // =========================

  const ARCADE_ENABLED = true;

  const UI_FONT = '14px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif';
  const UI_FONT_BOLD = 'bold 14px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif';
  const UI_FONT_SMALL = '12px/1.35 system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif';
  const UI_FONT_TITLE = 'bold 20px/1.2 system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif';


  const PANEL_IMAGE_SCALE = 0.5; // image width inside panel (0.5 smaller, 1.0 full)
  const PANEL_IMAGE_BOX_H = 260; // fixed reserved height for any panel image
  const PANEL_BOTTOM_PAD = 20;


  const BASE_W = 960;
  const BASE_H = 640;

  const CTA_SCALE = 0.25;   // 0.15–0.35 is typical
  const CTA_MARGIN = 2;    // px from bottom-right corner


  const SPRITE_SCALE = 1.2; // try 4, 5, 6

  const EASTER_EGG_W = 46;
  const EASTER_EGG_H = 60;  

  // Depth scaling (tweak per room)
  const DEPTH_SCALE_ENABLED = true;

  // Feet Y range where scaling happens (top -> bottom)
  const DEPTH_Y_TOP = 180;
  const DEPTH_Y_BOTTOM = 610;

  // Scale range (top -> bottom)
  const DEPTH_SCALE_MIN = 1.00;  // smaller at top
  const DEPTH_SCALE_MAX = 1.35;  // bigger at bottom


  // Spawn (set this to whatever you chose in Photopea)
  const SPAWN = { x: 228, y: 253 };

  const ARCADE_CONFIG = {
    scene: "outside",  // "outside" or "first_room"
    x: 337,               // center position X (adjust)
    y: 220,               // bottom position Y (adjust)
    scale: 0.13           // 1.0 = original size
  };

  const EASTER_SIGN_CONFIG = {
    scene: "outside",
    x: 130,
    y: 240,
    scale: 0.13 // change this whenever you want
  };

  const FIRST_ROOM_BLOCKS = [
    { imgKey: "block2", x: 350, y: 267 }
  ];

  // Movement tuning
  const SPEED = 120;          // pixels/sec in base coords
  const DIAG_MULT = 0.7071;   // 1/sqrt(2), keeps diagonal speed consistent
  const WALK_FPS = 10;        // animation speed

  // Collision: sample at "feet"
  const FOOT_Y_OFFSET = 0;   // tweak if your sprite floats/clips
  const FOOT_RADIUS = 1;      // small circle collision feel (2-3 px is good)

  let threadsData = null;

  const imageCache = new Map(); // key: path -> { img, loaded, error }

  


  // File paths
  const ASSETS = {
    bg: "outside.png",
    mask: "outside_mask.png",

    firstRoomBg: "first_room.png",
    firstRoomMask: "first_room_mask.png",
    eCta: "elements/E_CTA.png",

    secondRoomBg: "second_room.png",
    secondRoomMask: "second_room_mask.png",

    slide1: "elements/slide1.png",
    slide2: "elements/slide2.png",
    slide3: "elements/slide3.png",
    slide4: "elements/slide4.png",
    slide5: "elements/slide5.png",
    slide6: "elements/slide6.png",
    slide7: "elements/slide7.png",
    slide8: "elements/slide8.png",
    slide9: "elements/slide9.png",
    slide10: "elements/slide10.png",

    countRect: "elements/count.png",

    secondRoomIcon1: "elements/second_room_icons/icon1.png",
    secondRoomIcon2: "elements/second_room_icons/icon2.png",
    secondRoomIcon3: "elements/second_room_icons/icon3.png",
    secondRoomIcon4: "elements/second_room_icons/icon4.png",
    secondRoomIcon5: "elements/second_room_icons/icon5.png",

    easterBg: "easter.png",
    easterMask: "easter_mask.png",

    arcade: "elements/arcade.png",
    arcadePanel: "elements/arcade_panel.png",
    arcadeNeon: "elements/arcade_neon.png",

    resultsLeft: "elements/results_left.png",
    resultsRight: "elements/results_right.png",

    block1: "elements/block1.png",
    block2: "elements/block2.png",
    block3: "elements/block3.png",

    erikaFrames: [
      "elements/erika/erika1.png",
      "elements/erika/erika2.png",
      "elements/erika/erika3.png",
      "elements/erika/erika4.png"
    ],

    nojusFrames: [
      "elements/nojus/nojus1.png",
      "elements/nojus/nojus2.png",
      "elements/nojus/nojus3.png",
      "elements/nojus/nojus4.png"
    ],

    dominykasFrames: [
      "elements/dominykas/dominykas1.png",
      "elements/dominykas/dominykas2.png",
      "elements/dominykas/dominykas3.png",
      "elements/dominykas/dominykas4.png"
    ],

    easterSign: "elements/easter_sign.png",
    panelBg: "elements/background.png",

    outsideVar: {
      base: "elements/outside_var/outside_var2.png", // always drawn
      anim: [
        "elements/outside_var/outside_var3.png",     // frame A
        "elements/outside_var/outside_var1.png"
      ],
      fps: 5
    },

    eggFrames: [
      "elements/egg1.png",
      "elements/egg2.png",
      "elements/egg3.png",
      "elements/egg4.png",
      "elements/egg5.png",
      "elements/egg6.png",
      "elements/egg7.png"
    ],

    bunnyNpcFrames: [
      "elements/Bunny_npc/bunny_f1.png",
      "elements/Bunny_npc/bunny_f2.png",
      "elements/Bunny_npc/bunny_f3.png",
      "elements/Bunny_npc/bunny_f4.png",
      "elements/Bunny_npc/bunny_f5.png",
      "elements/Bunny_npc/bunny_f6.png",
      "elements/Bunny_npc/bunny_f7.png",
      "elements/Bunny_npc/bunny_f8.png",
      "elements/Bunny_npc/bunny_f9.png"
    ],

    trophyIcon1: "elements/trophy_icons/icon1.png",
    trophyIcon2: "elements/trophy_icons/icon2.png",
    trophyIcon3: "elements/trophy_icons/icon3.png",
    trophyIcon4: "elements/trophy_icons/icon4.png",
    trophyIcon5: "elements/trophy_icons/icon5.png",

    idle: {
      "north": "sprite/idle/north.png",
      "south": "sprite/idle/south.png",
      "east":  "sprite/idle/east.png",
      "west":  "sprite/idle/west.png",
      "north-east": "sprite/idle/north-east.png",
      "north-west": "sprite/idle/north-west.png",
      "south-east": "sprite/idle/south-east.png",
      "south-west": "sprite/idle/south-west.png",
    },
    walkDir: (dir, i) => `sprite/walk/${dir}/frame_${String(i).padStart(3,"0")}.png`,
    walkFramesPerDir: 6
  };

  // =========================
  // CANVAS + SCALING
  // =========================
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  // Offscreen (mask) canvas for pixel reads
  const maskCanvas = document.createElement("canvas");
  maskCanvas.width = BASE_W;
  maskCanvas.height = BASE_H;
  const maskCtx = maskCanvas.getContext("2d", { willReadFrequently: true });
  maskCtx.imageSmoothingEnabled = false;

  let view = {
    scale: 1,
    offsetX: 0,
    offsetY: 0,
    width: BASE_W,
    height: BASE_H
  };

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    // Fit BASE into screen while keeping aspect ratio (letterbox)
    const scale = Math.floor(Math.min(w / BASE_W, h / BASE_H)) || 1;

    canvas.width = BASE_W * scale;
    canvas.height = BASE_H * scale;

    canvas.style.width = canvas.width + "px";
    canvas.style.height = canvas.height + "px";

    view.scale = scale;
    view.width = BASE_W;
    view.height = BASE_H;
  }
  window.addEventListener("resize", resize);

  // =========================
// INPUT
// =========================
const keys = new Set();

const gamepadState = {
  connected: false,
  index: null,

  up: false,
  down: false,
  left: false,
  right: false,

  prevLeft: false,
  prevRight: false,

  interactPressed: false,
  interactPrev: false,

  cancelPressed: false,
  cancelPrev: false
};

window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  keys.add(k);

  // Panel open: E toggles close, ESC closes
  if (panel.open) {
    if (panel.type === "second_room_slides") {
      if (k === "e" || k === "escape") {
        closePanel();
        return;
      }

      if ((k === "d" || k === "arrowright") && !slidePanelAnim.active) {
        nextSecondRoomSlide();
        return;
      }

      if ((k === "a" || k === "arrowleft") && !slidePanelAnim.active) {
        prevSecondRoomSlide();
        return;
      }

      return;
    }

    if (k === "e" || k === "escape") closePanel();
    return;
  }

  if (k === "m") showMask = !showMask;

  if (k === "e") {
    tryInteract();
    return;
  }
});

window.addEventListener("gamepadconnected", (e) => {
  gamepadState.connected = true;
  gamepadState.index = e.gamepad.index;
  console.log("Gamepad connected:", e.gamepad.id);
});

window.addEventListener("gamepaddisconnected", (e) => {
  if (gamepadState.index === e.gamepad.index) {
    gamepadState.connected = false;
    gamepadState.index = null;

    gamepadState.up = false;
    gamepadState.down = false;
    gamepadState.left = false;
    gamepadState.right = false;

    gamepadState.prevLeft = false;
    gamepadState.prevRight = false;

    gamepadState.interactPressed = false;
    gamepadState.interactPrev = false;

    gamepadState.cancelPressed = false;
    gamepadState.cancelPrev = false;
  }
  console.log("Gamepad disconnected:", e.gamepad.id);
});


window.addEventListener("keyup", (e) => {
  keys.delete(e.key.toLowerCase());
});

window.addEventListener("blur", () => {
  keys.clear();
});

  let mouse = { x: 0, y: 0 };

  canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();

    mouse.x = (e.clientX - rect.left) / view.scale;
    mouse.y = (e.clientY - rect.top) / view.scale;
  });


  canvas.addEventListener("mousedown", e => {
    const rect = canvas.getBoundingClientRect();

    // Convert to game coords
    const mx = (e.clientX - rect.left) / view.scale;
    const my = (e.clientY - rect.top) / view.scale;

    if (easterGame.active && scene === "easter" && !panel.open) {
      for (let i = easterGame.eggs.length - 1; i >= 0; i--) {
        const egg = easterGame.eggs[i];
        const dx = mx - egg.x;
        const dy = my - egg.y;

        if (dx * dx + dy * dy <= egg.r * egg.r) {
          easterGame.eggs.splice(i, 1);
          easterGame.caught += 1;
          return;
        }
      }
    }

    if (easterGame.finished && scene === "easter" && !panel.open && easterGame.resultsButton) {
      const b = easterGame.resultsButton;

      if (
        mx >= b.x && mx <= b.x + b.w &&
        my >= b.y && my <= b.y + b.h
      ) {
        openEasterResultsPanel();
        return;
      }
    }

    const b = panel.closeBtn;

    if (
      mx >= b.x &&
      mx <= b.x + b.size &&
      my >= b.y &&
      my <= b.y + b.size
    ) {
      closePanel();
      return; // ✅ IMPORTANT: stop here
    }

    if (panel.open && panel.type === "second_room_slides") {
      const left = panel.leftArrowBtn;
      const right = panel.rightArrowBtn;

      if (
        right &&
        mx >= right.x && mx <= right.x + right.w &&
        my >= right.y && my <= right.y + right.h
      ) {
        if (!slidePanelAnim.active) nextSecondRoomSlide();
        return;
      }

      if (
        left &&
        mx >= left.x && mx <= left.x + left.w &&
        my >= left.y && my <= left.y + left.h
      ) {
        if (!slidePanelAnim.active) prevSecondRoomSlide();
        return;
      }
    }

    if (panel.open && panel.type === "easter_intro") {
      const yes = panel.easterYesBtn;
      const no = panel.easterNoBtn;

      if (yes &&
          mx >= yes.x && mx <= yes.x + yes.w &&
          my >= yes.y && my <= yes.y + yes.h) {
        startEasterChallenge();
        return;
      }

      if (no &&
          mx >= no.x && mx <= no.x + no.w &&
          my >= no.y && my <= no.y + no.h) {
        closePanel();
        return;
      }
    }

    // check links
    for (const link of panelLinks) {
      if (
        mx >= link.x &&
        mx <= link.x + link.w &&
        my >= link.y &&
        my <= link.y + link.h
      ) {
        window.open(link.url, "_blank");
        return;
      }
    }

  });


  window.addEventListener("wheel", (e) => {
    if (!panel.open) return;
    if (panel.type === "arcade") return;

    e.preventDefault();

    // 1) Normalize delta so trackpad/mouse behave consistently
    let delta = e.deltaY;

    // deltaMode: 0=pixels, 1=lines, 2=pages
    if (e.deltaMode === 1) delta *= 16;        // lines -> px approximation
    else if (e.deltaMode === 2) delta *= 500;  // pages -> px approximation

    // 2) Clamp insane spikes (momentum bursts)
    delta = Math.max(-80, Math.min(80, delta));

    // 3) Apply speed
    const SCROLL_SPEED = 0.9; // tweak 0.6–1.2
    panel.scroll += delta * SCROLL_SPEED;

    // 4) Snap to integer to avoid “sticky then jump”
    panel.scroll = Math.round(panel.scroll);

    // 5) Clamp using current content height
    const pad = 20;
    const w = 720;
    const h = 500;
    const ch = h - pad * 2;
    const cw = w - pad * 2;

    const contentH = getThreadContentHeight(panel.thread, cw);
    const maxScroll = Math.max(0, contentH - ch);

    panel.scroll = Math.max(0, Math.min(panel.scroll, maxScroll));
  }, { passive: false });


  function getMoveVector() {
    let dx = 0, dy = 0;

    if (keys.has("arrowleft") || keys.has("a") || gamepadState.left) dx -= 1;
    if (keys.has("arrowright") || keys.has("d") || gamepadState.right) dx += 1;
    if (keys.has("arrowup") || keys.has("w") || gamepadState.up) dy -= 1;
    if (keys.has("arrowdown") || keys.has("s") || gamepadState.down) dy += 1;

    if (dx !== 0 && dy !== 0) {
      dx *= DIAG_MULT;
      dy *= DIAG_MULT;
    }

    return { dx, dy };
  }

  function updateGamepadInput() {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    const gp = gamepadState.index != null ? pads[gamepadState.index] : null;

    if (!gp) {
      gamepadState.connected = false;

      gamepadState.up = false;
      gamepadState.down = false;
      gamepadState.left = false;
      gamepadState.right = false;

      gamepadState.interactPressed = false;
      gamepadState.cancelPressed = false;
      return;
    }

    gamepadState.connected = true;

    // D-pad
    gamepadState.up = !!gp.buttons[12]?.pressed;
    gamepadState.down = !!gp.buttons[13]?.pressed;
    gamepadState.left = !!gp.buttons[14]?.pressed;
    gamepadState.right = !!gp.buttons[15]?.pressed;

    // button 0 = Xbox A / PlayStation X
    gamepadState.interactPressed = !!gp.buttons[0]?.pressed;

    // button 1 = Xbox B / PlayStation O
    gamepadState.cancelPressed = !!gp.buttons[1]?.pressed;
  }

  function didPressGamepadInteract() {
    return gamepadState.interactPressed && !gamepadState.interactPrev;
  }

  function didPressGamepadCancel() {
    return gamepadState.cancelPressed && !gamepadState.cancelPrev;
  }

  function didPressGamepadLeft() {
    return gamepadState.left && !gamepadState.prevLeft;
  }

  function didPressGamepadRight() {
    return gamepadState.right && !gamepadState.prevRight;
  }

  function arrToText(v) {
    if (!v) return "";
    if (Array.isArray(v)) return v.join("\n");
    return String(v);
  }

  function normalizeThread(raw) {
    return {
      id: raw.id || "",
      title: raw.title || "",
      subtitle: raw.group || "",

      author: raw.author || "",
      date: raw.date || "",

      bodyText: arrToText(raw.body),
      image: raw.image || null,

      panelImage: raw.panelImage || null,
      panelText: raw.panelText || "",
      panelLinkText: raw.panelLinkText || "",
      panelLinkUrl: raw.panelLinkUrl || "",
      panelItems: Array.isArray(raw.panelItems) ? raw.panelItems : [],

      comments: (raw.comments || []).map(c => ({
        author: c.author || "",
        date: c.date || "",
        bodyText: arrToText(c.body),
        attachment: c.attachment || null,
        replies: (c.replies || []).map(r => ({
          author: r.author || "",
          date: r.date || "",
          bodyText: arrToText(r.body)
        }))
      }))
    };
  }



  function openThread(id) {
    if (!threadsData || !threadsData.threads) return;

    const raw = threadsData.threads.find(x => x.id === id);
    if (!raw) {
      console.warn("Thread not found for id:", id, threadsData);
      return;
    }

    panel.open = true;
    panel.thread = normalizeThread(raw);
    panel.scroll = 0;

    // Start image loading (if it exists)
    if (panel.thread.image) {
      getCachedImage(panel.thread.image);
    }
    if (panel.thread.panelImage) {
      getCachedImage(panel.thread.panelImage);
    }
  }

  function openSecondRoomSlidesPanel(title, slideKeys) {
    panel.open = true;
    panel.type = "second_room_slides";
    panel.slideIndex = 0;
    panel.slideTitle = title || "";
    panel.slides = (slideKeys || []).map(key => assets[key]).filter(Boolean);
  }

  function openDominykasPanel() {
    panel.open = true;
    panel.type = "second_room_slides";
    panel.slideIndex = 0;
    panel.slideTitle = "Labas, aš Dominykas👋. Užeik toliau, pasižiūrim kas vyksta Swedbank AI pasaulyje";
    panel.slides = [assets.slide1];
  }

  function nextSecondRoomSlide() {
    if (panel.type !== "second_room_slides") return;
    if (!panel.slides || panel.slideIndex >= panel.slides.length - 1) return;

    slidePanelAnim.active = true;
    slidePanelAnim.t = 0;
    slidePanelAnim.from = panel.slideIndex;
    slidePanelAnim.to = panel.slideIndex + 1;
    slidePanelAnim.direction = "right";
  }

  function prevSecondRoomSlide() {
    if (panel.type !== "second_room_slides") return;
    if (panel.slideIndex <= 0) return;

    slidePanelAnim.active = true;
    slidePanelAnim.t = 0;
    slidePanelAnim.from = panel.slideIndex;
    slidePanelAnim.to = panel.slideIndex - 1;
    slidePanelAnim.direction = "left";
  }

  function openNpcDialogue(npc) {
    npcDialogue.open = true;
    npcDialogue.npcId = npc.id;
    npcDialogue.text = npc.dialogue || "";
    npcDialogue.timer = 0;
    npcDialogue.duration = 6;
  }

  function openArcadePanel(text) {
    panel.open = true;
    panel.type = "arcade";
    panel.thread = null;
    panel.scroll = 0; // not used, but keep tidy
    panel.arcadeText = text || "";
  }

  function openEasterIntroPanel() {
    panel.open = true;
    panel.type = "easter_intro";
    panel.thread = null;
    panel.scroll = 0;
  }

  function startEasterChallenge() {
    panel.open = false;
    panel.type = "thread";

    easterGame.active = true;
    easterGame.eggs = [];
    easterGame.spawned = 0;
    easterGame.caught = 0;
    easterGame.escaped = 0;
    easterGame.spawnTimer = 0.3;
    easterGame.spawnInterval = 0.7;
    easterGame.finished = false;
    easterGame.resultsButton = null;

    if (!easterGame.completedOnce) {
      bunnyDialogue.text = "Greitai! Spausk ant kiaušinių ir surink kuo daugiau!";
      bunnyDialogue.visible = true;
      bunnyDialogue.timer = 0;
      bunnyDialogue.duration = 6;
    } else {
      bunnyDialogue.visible = false;
    }
  }

  function openEasterResultsPanel() {
    panel.open = true;
    panel.type = "easter_results";
    panel.thread = null;
    panel.scroll = 0;
  }

  function endEasterChallenge() {
    easterGame.active = false;
    easterGame.finished = true;
    easterGame.completedOnce = true;
  }

  function drawTalkNpcs() {
    for (const npc of TALK_NPCS) {
      if (npc.scene !== scene) continue;

      const frames = assets[npc.framesKey];
      const state = talkNpcState[npc.id];

      if (!frames || !frames.length || !state) continue;

      const img = frames[state.frame];
      const scale = npc.scale || SPRITE_SCALE;

      const w = img.width * scale;
      const h = img.height * scale;

      const dx = Math.round(npc.x - w / 2);
      const dy = Math.round(npc.y - h);

      ctx.drawImage(img, dx, dy, w, h);
    }
  }

  function drawSecondRoomIcons() {
    for (const icon of SECOND_ROOM_ICONS) {
      if (icon.scene !== scene) continue;

      const img = assets[icon.imgKey];
      if (!img) continue;

      const scale = icon.scale || 1;
      const w = img.width * scale;
      const h = img.height * scale;

      const drawX = Math.round(icon.x - w / 2);
      const drawY = Math.round(icon.y - h);

      ctx.drawImage(img, drawX, drawY, w, h);
    }
  }


  function dirFromVector(dx, dy, fallback) {
    if (dx === 0 && dy === 0) return fallback;

    if (dy < 0 && dx === 0) return "north";
    if (dy > 0 && dx === 0) return "south";
    if (dx > 0 && dy === 0) return "east";
    if (dx < 0 && dy === 0) return "west";

    if (dx > 0 && dy < 0) return "north-east";
    if (dx < 0 && dy < 0) return "north-west";
    if (dx > 0 && dy > 0) return "south-east";
    if (dx < 0 && dy > 0) return "south-west";

    return fallback;
  }

  function resolveAssetPath(path) {
    // Bundled mode
    if (typeof ASSET_DATA !== "undefined") {
      const v = ASSET_DATA[path];
      if (v) return v;

      // IMPORTANT: do NOT fall back to filesystem in bundled mode
      throw new Error("Missing bundled asset: " + path);
    }

    // Dev mode
    return path;
  }

  // =========================
  // ASSET LOADING
  // =========================
  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("Failed to load: " + src));
      img.src = resolveAssetPath(src);
    });
  }

  function getCachedImage(path) {
    if (!path) return null;

    if (!imageCache.has(path)) {
      const entry = { img: new Image(), loaded: false, error: false };

      entry.img.onload = () => { entry.loaded = true; };
      entry.img.onerror = () => { entry.error = true; };

      entry.img.src = resolveAssetPath(path); // IMPORTANT: path like "posts/images/xxx.png"

      imageCache.set(path, entry);
    }

    return imageCache.get(path);
  }


  async function loadJSON(path) {
    const res = await fetch(path);
    if (!res.ok) throw new Error("Failed to load " + path);
    return await res.json();
  }


  async function loadThreadsFromPostsFolder() {
    const index = await loadJSON("posts/index.json");

    const threads = await Promise.all(
      index.threads.map(async (entry) => {
        const t = await loadJSON(`posts/${entry.file}`);

        // Force an id that matches your gem ids, even if the JSON forgot it
        if (!t.id) t.id = entry.id;

        // Safety defaults so your renderer never crashes
        if (!t.title) t.title = entry.id;
        if (!t.subtitle) t.subtitle = "";
        if (!Array.isArray(t.posts)) t.posts = [];
        for (const p of t.posts) {
          if (!Array.isArray(p.comments)) p.comments = [];
          if (!p.body) p.body = "";
          if (!p.author) p.author = "";
          if (!p.date) p.date = "";
          for (const c of p.comments) {
            if (!c.body) c.body = "";
            if (!c.author) c.author = "";
          }
        }

        return t;
      })
    );

    return { threads };
  }

  function isWalkablePixel(x, y) {

    const d = maskCtx.getImageData(x, y, 1, 1).data; // [r,g,b,a]
    // Your mask is white/black, so r>200 is walkable
    return d[0] > 200;
  }

  // Small-radius foot collision (checks a few pixels around foot)
  function canStandAt(feetX, feetY) {
    const fx = Math.round(feetX);
    const fy = Math.round(feetY);

    for (let oy = -FOOT_RADIUS; oy <= FOOT_RADIUS; oy++) {
      for (let ox = -FOOT_RADIUS; ox <= FOOT_RADIUS; ox++) {
        if (Math.abs(ox) + Math.abs(oy) > FOOT_RADIUS) continue;
        if (!isWalkablePixel(fx + ox, fy + oy)) return false;
      }
    }
    return true;
  }

  function randomRange(a, b) {
  return a + Math.random() * (b - a);
}

  function spawnEasterEgg() {
    const margin = 12;
    const side = Math.floor(Math.random() * 4);

    let x, y, baseAngle;

    // Aim eggs roughly toward the center arena, not randomly across edges
    const targetX = BASE_W * 0.5;
    const targetY = BASE_H * 0.52;

    if (side === 0) { // top
      x = randomRange(40, BASE_W - 40);
      y = -margin;
    } else if (side === 1) { // right
      x = BASE_W + margin;
      y = randomRange(40, BASE_H - 40);
    } else if (side === 2) { // bottom
      x = randomRange(40, BASE_W - 40);
      y = BASE_H + margin;
    } else { // left
      x = -margin;
      y = randomRange(40, BASE_H - 40);
    }

    // Base direction = toward center
    baseAngle = Math.atan2(targetY - y, targetX - x);

    // Add only a limited spread so motion still feels varied
    const spread = 0.45; // radians; try 0.30 to 0.55
    const angle = baseAngle + randomRange(-spread, spread);

    const progress = easterGame.spawned / easterGame.totalToSpawn;
    const speed = 70 + progress * 130;

    const eggImg = assets.eggFrames[Math.floor(Math.random() * assets.eggFrames.length)];

    easterGame.eggs.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.max(EASTER_EGG_W, EASTER_EGG_H) * 0.35,
      img: eggImg,
      rot: randomRange(0, Math.PI * 2),
      rotSpeed: randomRange(-4, 4)
    });

    easterGame.spawned += 1;
  }

  function updateEasterGame(dt) {
    if (!easterGame.active) return;

    if (!panel.open && !transition.active && easterGame.spawned < easterGame.totalToSpawn) {
      easterGame.spawnTimer += dt;

      while (easterGame.spawnTimer >= easterGame.spawnInterval) {
        easterGame.spawnTimer -= easterGame.spawnInterval;
        spawnEasterEgg();

        const progress = easterGame.spawned / easterGame.totalToSpawn;
        easterGame.spawnInterval = Math.max(0.18, 0.7 - progress * 0.4);
      }
    }

    for (const egg of easterGame.eggs) {
      egg.x += egg.vx * dt;
      egg.y += egg.vy * dt;
      egg.rot += egg.rotSpeed * dt;
    }

    easterGame.eggs = easterGame.eggs.filter(egg => {
      const offscreen =
        egg.x < -40 || egg.x > BASE_W + 40 ||
        egg.y < -40 || egg.y > BASE_H + 40;

      if (offscreen) easterGame.escaped += 1;
      return !offscreen;
    });

    if (
      easterGame.spawned >= easterGame.totalToSpawn &&
      easterGame.eggs.length === 0
    ) {
      endEasterChallenge();
    }
  }

  function drawEasterEggs() {
    if (scene !== "easter") return;
    if (!easterGame.active && !easterGame.finished) return;

    for (const egg of easterGame.eggs) {
      ctx.save();
      ctx.translate(egg.x, egg.y);
      ctx.rotate(egg.rot);

      const w = EASTER_EGG_W;
      const h = EASTER_EGG_H;

      ctx.drawImage(egg.img, -w / 2, -h / 2, w, h);

      ctx.restore();
    }

    if (easterGame.finished && !panel.open) {
      ctx.font = 'bold 28px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      ctx.fillText("Iššūkis įvykdytas!", BASE_W / 2, 60);
      ctx.textAlign = "left";

      const btn = {
        x: 385,
        y: 80,
        w: 190,
        h: 42
      };

      easterGame.resultsButton = btn;

      const hovering =
        mouse.x >= btn.x && mouse.x <= btn.x + btn.w &&
        mouse.y >= btn.y && mouse.y <= btn.y + btn.h;

      ctx.fillStyle = hovering ? "#2d4f8f" : "#1d3563";
      ctx.fillRect(btn.x, btn.y, btn.w, btn.h);

      ctx.strokeStyle = "#9ec3ff";
      ctx.lineWidth = 2;
      ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);

      ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("Rezultatai", btn.x + btn.w / 2, btn.y + btn.h / 2);

      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
    }
  }

  // =========================
  // MAIN LOOP
  // =========================
  let lastT = performance.now();
  let assets = null;

  
  function update(dt) {
    updateGamepadInput();

    if (panel.open) {
      if (didPressGamepadCancel()) {
        closePanel();
      } else if (panel.type === "second_room_slides" && !slidePanelAnim.active) {
        if (didPressGamepadRight() && panel.slideIndex < panel.slides.length - 1) {
          nextSecondRoomSlide();
        } else if (didPressGamepadLeft() && panel.slideIndex > 0) {
          prevSecondRoomSlide();
        }
      }
    } else {
      if (didPressGamepadInteract()) {
        tryInteract();
      }
    }

    updateEasterGame(dt);

    if (panel.open && panel.type === "second_room_slides" && slidePanelAnim.active) {
      slidePanelAnim.t += dt;

      if (slidePanelAnim.t >= slidePanelAnim.duration) {
        slidePanelAnim.t = slidePanelAnim.duration;
        slidePanelAnim.active = false;
        panel.slideIndex = slidePanelAnim.to;
      }
    }

    if (npcDialogue.open) {
      npcDialogue.timer += dt;

      if (npcDialogue.timer >= npcDialogue.duration) {
        npcDialogue.open = false;
        npcDialogue.npcId = null;
        npcDialogue.text = "";
        npcDialogue.timer = 0;
      }
    }

    // Erika / Nojus idle animation
    for (const npc of TALK_NPCS) {
      const state = talkNpcState[npc.id];
      const frames = assets[npc.framesKey];

      if (!state || !frames || !frames.length) continue;
      if (npc.scene !== scene) continue;

      state.t += dt;
      const frameDur = 1 / npc.fps;

      if (state.t >= frameDur) {
        state.t -= frameDur;
        state.frame = (state.frame + 1) % frames.length;
      }
    }

    if (bunnyDialogue.visible) {
      bunnyDialogue.timer += dt;
      if (bunnyDialogue.timer >= bunnyDialogue.duration) {
        bunnyDialogue.visible = false;
      }
    }

    // 🐰 Bunny animation
    if (scene === "easter" && assets.bunnyNpcFrames) {
      bunnyNpc.t += dt;

      const frameDur = 1 / bunnyNpc.fps;

      if (bunnyNpc.t >= frameDur) {
        bunnyNpc.t -= frameDur;
        bunnyNpc.frame = (bunnyNpc.frame + 1) % assets.bunnyNpcFrames.length;
      }
    }

    if (panel.open) {
      gamepadState.interactPrev = gamepadState.interactPressed;
      gamepadState.cancelPrev = gamepadState.cancelPressed;
      gamepadState.prevLeft = gamepadState.left;
      gamepadState.prevRight = gamepadState.right;
      return;
    }

    // Transition in progress: freeze movement and advance wipe timer
    if (transition.active) {
      transition.t += dt;

      if (transition.t >= transition.duration) {
        transition.active = false;

        // Switch scene at end of wipe
        scene = transition.to;
        setMaskForScene();

      // Spawn based on destination
      if (scene === "first_room") {
        if (transition.from === "second_room") {
          player.x = FIRST_ROOM_RETURN_FROM_SECOND.x;
          player.y = FIRST_ROOM_RETURN_FROM_SECOND.y;
        } else {
          player.x = FIRST_ROOM_SPAWN.x;
          player.y = FIRST_ROOM_SPAWN.y;
        }

      } else if (scene === "second_room") {
        player.x = SECOND_ROOM_SPAWN.x;
        player.y = SECOND_ROOM_SPAWN.y;
      } else if (scene === "easter") {
        player.x = EASTER_SPAWN.x;
        player.y = EASTER_SPAWN.y;

      } else if (scene === "outside") {
        if (transition.from === "easter") {
          player.x = EASTER_RETURN_SPAWN.x;
          player.y = EASTER_RETURN_SPAWN.y;
        } else {
          player.x = OUTSIDE_RETURN_SPAWN.x;
          player.y = OUTSIDE_RETURN_SPAWN.y;
        }
      }

        // Reset animation
        player.animTime = 0;
        player.walkFrame = 0;
        player.moving = false;
      }

      gamepadState.interactPrev = gamepadState.interactPressed;
      gamepadState.cancelPrev = gamepadState.cancelPressed;
      gamepadState.prevLeft = gamepadState.left;
      gamepadState.prevRight = gamepadState.right;
      return;
    }

    const { dx, dy } = getMoveVector();
    player.moving = (dx !== 0 || dy !== 0);

    const desiredFacing = dirFromVector(dx, dy, player.facing);
    player.facing = desiredFacing;

    // Attempt move with simple axis separation (feels nicer around corners)
    if (player.moving) {
      const step = SPEED * dt;

      const nextX = player.x + dx * step;
      const nextY = player.y + dy * step;

      // Try X move
      if (canStandAt(nextX, player.y)) player.x = nextX;
      // Try Y move
      if (canStandAt(player.x, nextY)) player.y = nextY;

      // Animation
      player.animTime += dt;
      const frameDur = 1 / WALK_FPS;
      while (player.animTime >= frameDur) {
        player.animTime -= frameDur;
        player.walkFrame = (player.walkFrame + 1) % ASSETS.walkFramesPerDir;
      }
    } else {
      // reset walk cycle to a stable frame (optional)
      player.animTime = 0;
      player.walkFrame = 0;
    }

    // Animate outside overlays (var3 -> var1 -> loop)
    outsideVarState.t += dt;
    const ovFrameDur = 1 / ASSETS.outsideVar.fps;

    while (outsideVarState.t >= ovFrameDur) {
      outsideVarState.t -= ovFrameDur;
      outsideVarState.idx = (outsideVarState.idx + 1) % ASSETS.outsideVar.anim.length;
    }

    gamepadState.interactPrev = gamepadState.interactPressed;
    gamepadState.cancelPrev = gamepadState.cancelPressed;
    gamepadState.prevLeft = gamepadState.left;
    gamepadState.prevRight = gamepadState.right;
  }

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  function depthScaleForY(feetY) {
    const t = (feetY - DEPTH_Y_TOP) / (DEPTH_Y_BOTTOM - DEPTH_Y_TOP);
    const tt = clamp(t, 0, 1);
    return lerp(DEPTH_SCALE_MIN, DEPTH_SCALE_MAX, tt);
  }

  function getThreadContentHeight(thread, contentWidth) {
    if (!thread) return 0;

    let total = 0;

    // Title
    total += getTextHeight(thread.title, contentWidth - 40, 22) + 8;

    // Subtitle (group)
    if (thread.subtitle) {
      total += getTextHeight(thread.subtitle, contentWidth - 40, 18) + 10;
    }

    // Author/date
    if (thread.author || thread.date) {
      total += 22;
    }

    // Body
    ctx.font = "Roboto";
    total += getTextHeight(thread.bodyText, contentWidth, 18) + 14;

    // Thread main image: fixed reserved height (prevents scroll jumps)
    if (thread.image) {
      total += PANEL_IMAGE_BOX_H + 12;
    }

    // Comments header ("Comments" + spacing)
    if (thread.comments && thread.comments.length) {
      total += 22;
    }


    // Comments
    for (const c of thread.comments) {
      total += 18; // commenter name
      total += c.date ? 16 : 0;

      ctx.font = '13px "Segoe UI", Arial, sans-serif';
      total += getTextHeight(c.bodyText, contentWidth - 20, 16) + 10;

      if (c.attachment) {
        if (c.attachment.type === "image" && c.attachment.src) {
          total += PANEL_IMAGE_BOX_H + 12;
        } else {
          total += 24;
        }
      }


      for (const r of c.replies) {
        total += 16; // reply author
        ctx.font = '12px "Segoe UI", Arial, sans-serif';
        total += getTextHeight(r.bodyText, contentWidth - 40, 16) + 10;
      }

      total += 12;
    }

    total += PANEL_BOTTOM_PAD; // extra bottom space so you clamp nicely at the end

    return total;
  }



  function draw() {
    const { bg, mask, firstRoomBg, firstRoomMask, eCta, arcade, arcadeNeon, idle, walk, outsideVarBase, outsideVarAnim } = assets;


    // draw at base resolution into the main canvas (scaled by ctx.setTransform)
    ctx.setTransform(view.scale, 0, 0, view.scale, 0, 0);
    ctx.clearRect(0, 0, BASE_W, BASE_H);

    // Helper: draw a scene bg
    function drawSceneByName(sceneName) {
      if (sceneName === "outside") ctx.drawImage(assets.bg, 0, 0, BASE_W, BASE_H);
      else if (sceneName === "first_room") ctx.drawImage(assets.firstRoomBg, 0, 0, BASE_W, BASE_H);
      else if (sceneName === "second_room") ctx.drawImage(assets.secondRoomBg, 0, 0, BASE_W, BASE_H);
      else if (sceneName === "easter") ctx.drawImage(assets.easterBg, 0, 0, BASE_W, BASE_H);
    }

    // Helper: draw outside overlays only when outside
    function drawOutsideOverlays() {
      if (scene !== "outside") return;
      ctx.drawImage(outsideVarBase, 0, 0, BASE_W, BASE_H);
      const topOverlay = outsideVarAnim[outsideVarState.idx];
      ctx.drawImage(topOverlay, 0, 0, BASE_W, BASE_H);
    }
    
    // Normal draw or transitioning draw
    if (!transition.active) {
      drawSceneByName(scene);
      drawOutsideOverlays();

      if (scene === "outside" && assets.countRect) {
        const img = assets.countRect;

        const scale = 0.2; // adjust if needed

        const w = img.width * scale;
        const h = img.height * scale;

        const centerX = 133;
        const centerY = 580;

        const drawX = Math.round(centerX - w / 2);
        const drawY = Math.round(centerY - h / 2);

        ctx.drawImage(img, drawX, drawY, w, h);

        // TEXT INSIDE RECTANGLE
        ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
        ctx.fillStyle = "#4a2a16";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const text = "SwedAI narių: 521"; // <-- CHANGE THIS ANYTIME

        ctx.fillText(text, centerX +3, centerY +3);

        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
      }

      if (scene === "first_room") {
        for (const b of FIRST_ROOM_BLOCKS) {
          const img = assets[b.imgKey];
          if (!img) continue;

          const scale = 0.13; // change this if needed
          const w = img.width * scale;
          const h = img.height * scale;

          const drawX = Math.round(b.x - w / 2);
          const drawY = Math.round(b.y - h);

          ctx.drawImage(img, drawX, drawY, w, h);
        }
      }

      if (scene === "second_room") {
        drawSecondRoomIcons();
      }

      if (scene === "easter") {
        const img = assets.bunnyNpcFrames[bunnyNpc.frame];

        const scale = 2; // ← adjust size here
        const w = img.width * scale;
        const h = img.height * scale;

        const dx = bunnyNpc.x - w / 2;
        const dy = bunnyNpc.y - h;

        ctx.drawImage(img, dx, dy, w, h);

        drawBunnyDialogue();
      }

      drawTalkNpcs();
      drawNpcDialogue();
      
    } else {
      // Wipe: reveal "to" over "from" left-to-right
      const p = Math.min(1, transition.t / transition.duration);
      const wipeX = Math.floor(BASE_W * p);

      const fromScene = transition.from;
      const toScene = transition.to;

      // Draw FROM scene
      drawSceneByName(fromScene);

      // From overlays (only if outside)
      if (fromScene === "outside") {
        ctx.drawImage(outsideVarBase, 0, 0, BASE_W, BASE_H);
        const topOverlay = outsideVarAnim[outsideVarState.idx];
        ctx.drawImage(topOverlay, 0, 0, BASE_W, BASE_H);
      }

      // Clip and draw TO scene
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, wipeX, BASE_H);
      ctx.clip();

      drawSceneByName(toScene);

      // To overlays (only if outside)
      if (toScene === "outside") {
        ctx.drawImage(outsideVarBase, 0, 0, BASE_W, BASE_H);
        const topOverlay2 = outsideVarAnim[outsideVarState.idx];
        ctx.drawImage(topOverlay2, 0, 0, BASE_W, BASE_H);
      }

      ctx.restore();

      // Optional wipe edge
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "#000";
      ctx.fillRect(wipeX, 0, 3, BASE_H);
      ctx.restore();
    }

    if (ARCADE_ENABLED && !transition.active && scene === ARCADE_CONFIG.scene) {

      const scale = ARCADE_CONFIG.scale;

      // Alternate every second
      const t = Math.floor(performance.now() / 1000);
      const useNeon = t % 2 === 0;

      const arcadeImg = useNeon ? assets.arcadeNeon : assets.arcade;

      if (!arcadeImg) return;

      const w = arcadeImg.width * scale;
      const h = arcadeImg.height * scale;

      const drawX = Math.round(ARCADE_CONFIG.x - w / 2);
      const drawY = Math.round(ARCADE_CONFIG.y - h);

      ctx.drawImage(arcadeImg, drawX, drawY, w, h);
    }

    if (!transition.active && scene === EASTER_SIGN_CONFIG.scene) {
      const img = assets.easterSign;
      const scale = EASTER_SIGN_CONFIG.scale;

      const w = img.width * scale;
      const h = img.height * scale;

      const drawX = Math.round(EASTER_SIGN_CONFIG.x - w / 2);
      const drawY = Math.round(EASTER_SIGN_CONFIG.y - h);

      ctx.drawImage(img, drawX, drawY, w, h);
    }

    // Optional: mask overlay
    if (showMask) {
      ctx.globalAlpha = 0.25;

      if (scene === "outside") {
        ctx.drawImage(assets.mask, 0, 0, BASE_W, BASE_H);
      } else if (scene === "first_room") {
        ctx.drawImage(assets.firstRoomMask, 0, 0, BASE_W, BASE_H);
      } else if (scene === "second_room") {
        ctx.drawImage(assets.secondRoomMask, 0, 0, BASE_W, BASE_H);
      } else if (scene === "easter") {
        ctx.drawImage(assets.easterMask, 0, 0, BASE_W, BASE_H);
      }

      ctx.globalAlpha = 1;
    }

    // E CTA (small, bottom-right) when near an interaction point
    if (!panel.open && !transition.active && (
      nearTempleEntrance() ||
      nearEasterEntrance() ||
      nearFirstRoomExit() ||
      nearEasterExit() ||
      nearSecondRoomEntrance() ||
      nearSecondRoomExit() ||
      nearEasterChallenge() ||
      nearGem() ||
      nearTalkNpc() ||
      nearSecondRoomIcon() ||
      (ARCADE_ENABLED && nearArcade())
    )) {

      const w = Math.round(eCta.width * CTA_SCALE);
      const h = Math.round(eCta.height * CTA_SCALE);

      const px = BASE_W - CTA_MARGIN - w;
      const py = BASE_H - CTA_MARGIN - h;

      ctx.drawImage(eCta, 0, 0, eCta.width, eCta.height, px, py, w, h);
    }



    if (!transition.active) {
      // Player sprite (draw only when not transitioning)
      const dir = player.facing;
      const spriteImg = player.moving ? walk[dir][player.walkFrame] : idle[dir];

      let depthMul = 1;
      if (DEPTH_SCALE_ENABLED && (scene === "first_room" || scene === "second_room")) {
        depthMul = depthScaleForY(player.y);
      }

      const w = spriteImg.width * SPRITE_SCALE * depthMul;
      const h = spriteImg.height * SPRITE_SCALE * depthMul;

      const drawX = Math.round(player.x - w / 2);
      const drawY = Math.round(player.y - h);

      ctx.drawImage(
        spriteImg,
        0, 0, spriteImg.width, spriteImg.height,
        drawX, drawY, w, h
      );
    }

    drawEasterEggs();

    function drawBunnyDialogue() {
      if (scene !== "easter") return;
      if (!bunnyDialogue.visible) return;

      const text = bunnyDialogue.text;
      const maxW = 260;
      const lineH = 20;

      ctx.save();

      ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
      const lines = wrapTextLines(text, maxW - 24);

      const boxW = maxW;
      const boxH = lines.length * lineH + 24;

      const boxX = Math.round(bunnyNpc.x - boxW / 2);
      const boxY = Math.round(bunnyNpc.y - 195);

      // Bubble background
      ctx.fillStyle = "rgba(20, 20, 20, 0.95)";
      ctx.fillRect(boxX, boxY, boxW, boxH);

      // Border
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      // Little pointer triangle
      ctx.beginPath();
      ctx.moveTo(bunnyNpc.x - 10, boxY + boxH);
      ctx.lineTo(bunnyNpc.x + 10, boxY + boxH);
      ctx.lineTo(bunnyNpc.x, boxY + boxH + 12);
      ctx.closePath();
      ctx.fillStyle = "rgba(20, 20, 20, 0.95)";
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.stroke();

      // Text
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      let yy = boxY + 12;
      for (const line of lines) {
        ctx.fillText(line, boxX + boxW / 2, yy);
        yy += lineH;
      }

      ctx.restore();
    }

    function drawNpcDialogue() {
      
      if (!npcDialogue.open) return;

      const npc = TALK_NPCS.find(n => n.id === npcDialogue.npcId);
      if (!npc) return;
      if (npc.scene !== scene) return;

      const text = npcDialogue.text;
      const maxW = 260;
      const lineH = 20;

      ctx.save();

      ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
      const lines = wrapTextLines(text, maxW - 24);

      const boxW = maxW;
      const boxH = lines.length * lineH + 24;

      const offsetX = npc.dialogueOffsetX || 0;
      const offsetY = npc.dialogueOffsetY || -120;

      const boxX = Math.round(npc.x - boxW / 2 + offsetX);
      const boxY = Math.round(npc.y + offsetY);

      // bubble background
      ctx.fillStyle = "rgba(20, 20, 20, 0.95)";
      ctx.fillRect(boxX, boxY, boxW, boxH);

      // border
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      const pointerOffsetX = npc.dialoguePointerOffsetX || 0;
      const pointerOffsetY = npc.dialoguePointerOffsetY || 0;
      const pointerSize = 12;

      if (npc.pointerDir === "down") {
        const px = npc.x + pointerOffsetX;

        ctx.beginPath();
        ctx.moveTo(px - 10, boxY + boxH);
        ctx.lineTo(px + 10, boxY + boxH);
        ctx.lineTo(px, boxY + boxH + pointerSize);
        ctx.closePath();

      } else if (npc.pointerDir === "left") {
        const py = npc.y + pointerOffsetY;

        ctx.beginPath();
        ctx.moveTo(boxX, py - 10);
        ctx.lineTo(boxX, py + 10);
        ctx.lineTo(boxX - pointerSize, py);
        ctx.closePath();

      } else if (npc.pointerDir === "right") {
        const py = npc.y + pointerOffsetY;

        ctx.beginPath();
        ctx.moveTo(boxX + boxW, py - 10);
        ctx.lineTo(boxX + boxW, py + 10);
        ctx.lineTo(boxX + boxW + pointerSize, py);
        ctx.closePath();
      }

      ctx.fillStyle = "rgba(20, 20, 20, 0.95)";
      ctx.fill();

      ctx.strokeStyle = "#ffffff";
      ctx.stroke();

      // text
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      let yy = boxY + 12;
      for (const line of lines) {
        ctx.fillText(line, boxX + boxW / 2, yy);
        yy += lineH;
      }

      ctx.restore();

      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
    }

    if (panel.open) {
      if (panel.type === "thread") {
        if (panel.thread && panel.thread.id === "blue_gem") {
          drawBlueGemPanel();
        } else if (panel.thread && panel.thread.id === "red_gem") {
          drawRedGemPanel();
        } else if (panel.thread && panel.thread.id === "gold_trophy") {
          drawGoldTrophyPanel();
        } else {
          drawThreadPanel();
        }
      }
      else if (panel.type === "arcade") drawArcadePanel();
      else if (panel.type === "easter_intro") drawEasterIntroPanel();
      else if (panel.type === "easter_results") drawEasterResultsPanel();
      else if (panel.type === "second_room_slides") drawSecondRoomSlidesPanel();
    }

    drawNpcDialogue();

    // HUD
    const hud = document.getElementById("hud");
    hud.textContent =
      `pos: ${player.x.toFixed(1)}, ${player.y.toFixed(1)}\n` +
      `facing: ${player.facing}\n` +
      `moving: ${player.moving}\n` +
      `scene: ${scene}\n` +
      `mask overlay (M): ${showMask ? "ON" : "OFF"}\n` +
      `easter active: ${easterGame.active}\n` +
      `spawned: ${easterGame.spawned}\n` +
      `eggs on screen: ${easterGame.eggs.length}`;
  }

  function loop(t) {
    const dt = Math.min(0.033, (t - lastT) / 1000); // clamp
    lastT = t;

    update(dt);
    draw();

    requestAnimationFrame(loop);
  }

  function drawAttachmentImage(attachment, cx, drawY, cw, cy, ch) {
    if (!attachment || attachment.type !== "image" || !attachment.src) return { drawn: false, height: 0 };

    // Lazy-load: only start loading if near visible area
    const preloadMargin = 250;
    const visibleTop = cy - preloadMargin;
    const visibleBottom = cy + ch + preloadMargin;

    if (drawY < visibleTop || drawY > visibleBottom) {
      return { drawn: false, height: 0 };
    }

    const cached = getCachedImage(attachment.src);

    const targetW = Math.round(cw * PANEL_IMAGE_SCALE);
    const boxH = PANEL_IMAGE_BOX_H;
    const imgX = Math.round(cx + (cw - targetW) / 2);
    const boxY = drawY;

    if (cached && cached.loaded && !cached.error) {
      const img = cached.img;
      const scale = Math.min(targetW / img.width, boxH / img.height);
      const dw = Math.round(img.width * scale);

      }

      const toImg = slides[slidePanelAnim.to];

      let toOffset = 0;

      if (slidePanelAnim.direction === "right") {
        fromOffset = -imageW * p;
        toOffset = imageW * (1 - p);

        toOffset = -imageW * (1 - p);
      }

      if (fromImg) {
        ctx.drawImage(fromImg, imageX + fromOffset, imageY, imageW, imageH);

  function wrapTextLines(text, maxW) {
    // preserves \n line breaks
    const paragraphs = String(text).split("\n");
    const lines = [];

    for (const para of paragraphs) {
      // blank line
      if (para.trim() === "") {
        lines.push("");
        continue;
      }

      const words = para.split(" ");
      let line = "";

      for (const word of words) {
        const test = line ? (line + " " + word) : word;
        const w = ctx.measureText(test).width;

        if (w > maxW && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
    }

    return lines;
  }

  function drawCenteredWrappedText(text, x, y, w, h, lineH) {
    const lines = wrapTextLines(String(text || ""), w);

    // total height of all lines
    const totalH = lines.length * lineH;

    // start Y so that block is vertically centered
    let yy = y + Math.round((h - totalH) / 2) + lineH;

    ctx.textAlign = "center";

    for (const line of lines) {
      ctx.fillText(line, x + w / 2, yy);
      yy += lineH;
    }

    ctx.textAlign = "left";
  }

  function drawWrappedText(text, x, y, maxW, lineH) {
    const lines = wrapTextLines(text, maxW);

    for (const line of lines) {

      if (line === "") {
        y += lineH;
        continue;
      }

      const isLink =
        line.startsWith("http://") ||
        line.startsWith("https://");

      if (isLink) {
        ctx.fillStyle = "#6cf";

        ctx.fillText(line, x, y);

        const width = ctx.measureText(line).width;

        // store clickable region
        panelLinks.push({
          url: line,
          x,
          y: y - lineH + 4,
          w: width,
          h: lineH
        });

      } else {
        ctx.fillText(line, x, y);
      }

      y += lineH;
    }
  }


  function getTextHeight(text, maxW, lineH) {
    const lines = wrapTextLines(text, maxW);
    return lines.length * lineH;
  }
